<div class="profile-container" *ngIf="!isLoading">
  <mat-card class="profile-card">
    <mat-card-header>
      <div mat-card-avatar class="header-image">
        <mat-icon>account_circle</mat-icon>
      </div>
      <mat-card-title>{{ profileData.full_name }}</mat-card-title>
      <mat-card-subtitle>{{ profileData.role }}</mat-card-subtitle>
      
      <span class="spacer"></span>
      <button mat-icon-button color="primary" (click)="toggleEdit()" *ngIf="!isEditing">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="toggleEdit()" *ngIf="isEditing">
        <mat-icon>close</mat-icon>
      </button>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="profileForm" class="profile-form">
        
        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Full Name</mat-label>
            <input matInput formControlName="full_name" [readonly]="!isEditing">
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email Address</mat-label>
            <input matInput formControlName="email" [readonly]="!isEditing">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Phone Number</mat-label>
            <input matInput formControlName="phone_number" [readonly]="!isEditing">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Address</mat-label>
            <textarea matInput formControlName="address" rows="3" [readonly]="!isEditing"></textarea>
          </mat-form-field>
        </div>

      </form>
    </mat-card-content>

    <mat-card-actions align="end" *ngIf="isEditing">
      <button mat-button (click)="toggleEdit()" [disabled]="isSaving">Cancel</button>
      <button mat-raised-button color="primary" (click)="saveProfile()" [disabled]="profileForm.invalid || isSaving">
        <mat-spinner diameter="20" *ngIf="isSaving" class="spinner-margin"></mat-spinner>
        Save Changes
      </button>
    </mat-card-actions>
  </mat-card>
</div>

<div class="loading-shade" *ngIf="isLoading">
  <mat-spinner></mat-spinner>
</div>

<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>HRMS Sign In</mat-card-title>
      <mat-card-subtitle>Enter your credentials to continue</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="username" type="email" placeholder="john.doe@example.com">
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
            Email is required
          </mat-error>
          <mat-error *ngIf="loginForm.get('username')?.hasError('email')">
            Please enter a valid email address
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
        </mat-form-field>

        <div class="error-message" *ngIf="errorMsg">
          {{ errorMsg }}
        </div>

        <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid || isLoading" class="full-width submit-btn">
          <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
          <span *ngIf="!isLoading">Sign In</span>
        </button>
      </form>
    </mat-card-content>
    
    <mat-card-actions class="auth-actions">
      <p>Don't have an account? <a routerLink="/auth/register">Sign Up</a></p>
    </mat-card-actions>
  </mat-card>
</div>

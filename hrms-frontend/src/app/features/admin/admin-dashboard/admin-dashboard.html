<div class="admin-container">
  
  <div class="header-actions">
    <h2>Admin Approval Hub</h2>
    <button mat-icon-button (click)="loadAllLeaves()" matTooltip="Refresh list">
      <mat-icon>refresh</mat-icon>
    </button>
  </div>

  <mat-card class="table-card">
    <div class="loading-shade" *ngIf="isLoading">
      <mat-spinner></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <ng-container matColumnDef="employee_id">
        <th mat-header-cell *matHeaderCellDef> Employee ID </th>
        <td mat-cell *matCellDef="let element"> {{element.employee_id | slice:0:8}}... </td>
      </ng-container>

      <ng-container matColumnDef="leave_type">
        <th mat-header-cell *matHeaderCellDef> Type </th>
        <td mat-cell *matCellDef="let element"> {{element.leave_type}} </td>
      </ng-container>

      <ng-container matColumnDef="start_date">
        <th mat-header-cell *matHeaderCellDef> Start </th>
        <td mat-cell *matCellDef="let element"> {{element.start_date | date:'shortDate'}} </td>
      </ng-container>

      <ng-container matColumnDef="end_date">
        <th mat-header-cell *matHeaderCellDef> End </th>
        <td mat-cell *matCellDef="let element"> {{element.end_date | date:'shortDate'}} </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element"> 
          <span class="status-badge" [ngClass]="element.status.toLowerCase()">
            {{element.status}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="reason">
        <th mat-header-cell *matHeaderCellDef> Reason </th>
        <td mat-cell *matCellDef="let element" class="reason-col"> {{element.reason || '-'}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" matTooltip="Approve" 
                  (click)="openActionDialog(element.id, 'APPROVE')" 
                  [disabled]="element.status !== 'PENDING'">
            <mat-icon>check_circle</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Reject" 
                  (click)="openActionDialog(element.id, 'REJECT')"
                  [disabled]="element.status !== 'PENDING'">
            <mat-icon>cancel</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="7" style="text-align: center; padding: 20px;">
          No leave requests in queue.
        </td>
      </tr>
    </table>
  </mat-card>
</div>

<mat-sidenav-container class="sidenav-container">
  <!-- Sidebar Navigation -->
  <mat-sidenav #sidenav mode="side" opened class="sidenav" [fixedInViewport]="true">
    <div class="sidenav-header">
      <mat-icon>business</mat-icon>
      <h2>HRMS</h2>
    </div>
    
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <div matListItemTitle>Dashboard</div>
      </a>
      <a mat-list-item routerLink="/attendance" routerLinkActive="active-link">
        <mat-icon matListItemIcon>access_time</mat-icon>
        <div matListItemTitle>Attendance</div>
      </a>
      <a mat-list-item routerLink="/leave" routerLinkActive="active-link">
        <mat-icon matListItemIcon>event_busy</mat-icon>
        <div matListItemTitle>Leave Requests</div>
      </a>
      <a mat-list-item routerLink="/payroll" routerLinkActive="active-link">
        <mat-icon matListItemIcon>account_balance_wallet</mat-icon>
        <div matListItemTitle>Payroll</div>
      </a>
      
      <!-- HR Admin Only Menu -->
      <a mat-list-item *ngIf="currentUser?.role === 'HR_ADMIN'" routerLink="/admin" routerLinkActive="active-link">
        <mat-icon matListItemIcon>admin_panel_settings</mat-icon>
        <div matListItemTitle>Admin Panel</div>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content Area -->
  <mat-sidenav-content class="main-content">
    <mat-toolbar color="primary" class="top-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span>{{ currentUser?.email || 'User' }} ({{ currentUser?.role }})</span>
      <span class="spacer"></span>
      <button mat-icon-button (click)="logout()" title="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <!-- Nested Routes Render Here -->
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
